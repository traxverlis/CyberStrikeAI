# ============================================
# Fichier de configuration CyberStrikeAI
# ============================================
# Ce fichier de configuration prend en charge la configuration visuelle via l'interface Web
# Cliquez sur le bouton "Paramètres" en haut à droite pour modifier la configuration
# ============================================

# ============================================
# Paramètres système
# ============================================

# Numéro de version affiché dans le front-end (facultatif, affiche la version par défaut si vide)
version: "v1.3.16"

# Configuration du serveur
server:
  host: 0.0.0.0 # Adresse d'écoute, 0.0.0.0 signifie écouter sur toutes les interfaces réseau
  port: 8080     # Port du service HTTP, accessible via un navigateur à http://localhost:8080

# Configuration d'authentification
auth:
  password:  # Mot de passe de connexion Web, veuillez le changer pour un mot de passe fort
  session_duration_hours: 12          # Durée de validité de la connexion (heures), reconnexion nécessaire après expiration

# Configuration des journaux
log:
  level: info   # Niveau de journalisation: debug(débogage), info(information), warn(avertissement), error(erreur)
  output: stdout # Destination de sortie des journaux: stdout(sortie standard), stderr(erreur standard), ou chemin de fichier

# ============================================
# Configuration liée aux conversations
# ============================================

# Configuration du modèle IA (prend en charge l'API compatible OpenAI)
# Champs obligatoires: api_key, base_url, model doivent être remplis pour un fonctionnement normal
# Fournisseurs de services API pris en charge:
#   - OpenAI: https://api.openai.com/v1
#   - DeepSeek: https://api.deepseek.com/v1
#   - Autres API compatibles avec le protocole OpenAI
# Modèles couramment utilisés: gpt-4, gpt-3.5-turbo, deepseek-chat, claude-3-opus, etc.
openai:
  base_url: https://api.deepseek.com/v1 # URL de base de l'API (obligatoire)
  api_key: sk-xxxx                       # Clé API (obligatoire)
  model: deepseek-chat                   # Nom du modèle (obligatoire)
  max_total_tokens: 120000              # Limite maximale de tokens pour le contexte lié au LLM (compression de mémoire et construction de chaîne d'attaque partageront cette configuration)

# ============================================
# Configuration de collecte d'informations (FOFA) (facultatif)
# ============================================
# Utilisé pour la page « Collecte d'informations » afin d'appeler l'API FOFA (proxy backend, évite l'exposition de la clé côté front-end)
# Peut également être configuré via des variables d'environnement: FOFA_EMAIL / FOFA_API_KEY (priorité supérieure)
fofa:
  base_url: "https://fofa.info/api/v1/search/all" # Facultatif, utilise la valeur par défaut si vide
  email: ""   # Email du compte FOFA (facultatif, recommandé de remplir dans les paramètres système)
  api_key: "" # Clé API FOFA (facultatif, recommandé de remplir dans les paramètres système)

# Configuration de l'agent
# Lorsque le nombre maximal d'itérations est atteint, l'IA résumera automatiquement les résultats des tests
agent:
  max_iterations: 120           # Nombre maximal d'itérations, maximum de tours d'appels d'outils que l'agent IA peut exécuter
  large_result_threshold: 102400 # Seuil de grand résultat (octets), par défaut 50KB, sera automatiquement enregistré dans le stockage si dépassé
  result_storage_dir: tmp        # Répertoire de stockage des résultats, les grands résultats seront enregistrés dans ce répertoire

# Configuration de la base de données
database:
  path: data/conversations.db    # Chemin du fichier de base de données SQLite, utilisé pour stocker l'historique des conversations et les messages
  knowledge_db_path: data/knowledge.db # Chemin du fichier de base de données de la base de connaissances (facultatif, utilise la base de données de session si vide), utilisé pour stocker les éléments de la base de connaissances et les embeddings vectoriels, peut être copié et réutilisé indépendamment

# ============================================
# Configuration liée à la gestion des tâches
# ============================================
# (Les éléments de configuration sont inclus dans la configuration liée aux conversations)

# ============================================
# Configuration liée à la gestion des vulnérabilités
# ============================================

# Configuration des outils de sécurité
# Le système chargera tous les fichiers de configuration d'outils au format .yaml depuis ce répertoire
# Méthode recommandée: créer un fichier de configuration indépendant pour chaque outil dans le répertoire tools/
security:
  tools_dir: tools # Répertoire des fichiers de configuration des outils (relatif au répertoire du fichier de configuration)
  # Mode de description des outils: lors du chargement des outils depuis tools, source de description exposée pour utilisation par IA/API
  #   short - Utilise de préférence short_description (description courte, économise des tokens), utilise description si vide
  #   full  - Utilise description (description détaillée)
  tool_description_mode: full

# ============================================
# Configuration liée au MCP
# ============================================

# Configuration du protocole MCP
# MCP (Model Context Protocol) utilisé pour l'enregistrement et l'appel d'outils
mcp:
  enabled: false # Activer ou non le serveur MCP (mode http)
  host: 0.0.0.0  # Adresse d'écoute du serveur MCP
  port: 8081     # Port du serveur MCP

# Configuration MCP externe
external_mcp:
  servers: {}

# ============================================
# Configuration liée à la base de connaissances
# ============================================

knowledge:
  enabled: false                    # Activer ou non la fonctionnalité de récupération de connaissances
  base_path: knowledge_base         # Chemin du répertoire de la base de connaissances (relatif au répertoire du fichier de configuration)
  embedding:
    provider: openai                # Fournisseur de modèle d'embedding (actuellement seul openai est pris en charge)
    model: text-embedding-v4        # Nom du modèle d'embedding
    base_url: https://api.deepseek.com/v1 # Laisser vide pour utiliser base_url de la configuration OpenAI
    api_key: sk-xxxxxx              # Laisser vide pour utiliser api_key de la configuration OpenAI
  retrieval:
    top_k: 5                        # Nombre de résultats Top-K retournés par la récupération
    similarity_threshold: 0.7       # Seuil de similarité (0-1), les résultats en dessous de ce seuil seront filtrés
    hybrid_weight: 0.7              # Poids de récupération hybride (0-1), poids de la récupération vectorielle, 1.0 signifie récupération purement vectorielle, 0.0 signifie récupération purement par mots-clés

# ============================================
# Configuration des robots (WeChat Entreprise, DingTalk, Feishu)
# ============================================
# Utilisé pour dialoguer avec CyberStrikeAI depuis un téléphone mobile via WeChat Entreprise/DingTalk/Feishu, utilisable sans déploiement sur serveur
# Peut être configuré dans Paramètres système -> Paramètres du robot
robots:
  wecom: # WeChat Entreprise
    enabled: false
    token: ""
    encoding_aes_key: ""
    corp_id: ""
    secret: ""
    agent_id: 0
  dingtalk: # DingTalk
    enabled: false
    client_id:
    client_secret:
  lark: # Feishu (Lark)
    enabled: false
    app_id: ""
    app_secret: ""
    verify_token: ""

# ============================================
# Configuration liée aux Skills
# ============================================

# Le système chargera tous les skills depuis ce répertoire, chaque skill doit être un répertoire contenant un fichier SKILL.md
# Par exemple: skills/sql-injection-testing/SKILL.md
skills_dir: skills # Répertoire des fichiers de configuration Skills (relatif au répertoire du fichier de configuration)

# ============================================
# Configuration liée aux rôles
# ============================================

# Le système chargera tous les fichiers de configuration de rôles au format .yaml depuis ce répertoire
# Chaque rôle doit créer un fichier de configuration indépendant, par exemple: roles/CTF.yaml, roles/Par-defaut.yaml, etc.
roles_dir: roles # Répertoire des fichiers de configuration des rôles (relatif au répertoire du fichier de configuration)
